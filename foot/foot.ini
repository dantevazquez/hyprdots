include = ~/.config/theme/current/foot.ini

[main]
term = xterm-256color
font = JetBrainsMono Nerd Font:size=10
font-bold = JetBrainsMono Nerd Font:style=Bold:size=10
font-italic = JetBrainsMono Nerd Font:style=Italic:size=10

[key-bindings]
clipboard-copy = Control+Insert

[text-bindings]
\x001 = Control+1
\x002 = Control+2
\x003 = Control+3
\x004 = Control+4
\x005 = Control+5
\x006 = Control+6
\x007 = Control+7
\x008 = Control+8
\x009 = Control+9
